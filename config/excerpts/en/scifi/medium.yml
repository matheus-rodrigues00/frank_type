- id: asimov-lets-get-together-medium-1
  title: Let's Get Together
  author: Isaac Asimov
  source: "Project Gutenberg ebook #68377"
  source_url: https://www.gutenberg.org/ebooks/68377
  text: >
    A kind of peace had endured for a century and people had forgotten what
    anything else was like. They would scarcely have known how to react had they
    discovered that a kind of war had finally come. Elias Lynn, Chief of the
    Bureau of Robotics, was not sure how he ought to react when he finally found
    out. The Bureau was headquartered in Cheyenne, in line with the century old
    trend toward decentralization, and Lynn stared dubiously at the young
    Security officer from Washington who had brought the news.
- id: asimov-lets-get-together-medium-2
  title: Let's Get Together
  author: Isaac Asimov
  source: "Project Gutenberg ebook #68377"
  source_url: https://www.gutenberg.org/ebooks/68377
  text: >
    It came to him quietly. Lynn found he had nothing to do but sit in his office
    alone, with an executive position that had grown merely titular. Perhaps that
    helped. It gave him time to think, to picture the creative scientists of half
    the world converging on Cheyenne. It was Breckenridge who, with cool
    efficiency, was handling the details of preparation. There had been a kind of
    confidence in the way he said that they should get together and they would
    win. It came to Lynn so quietly that anyone watching him might have seen only
    his eyes blink slowly twice.
- id: capek-rur-medium-1
  title: R.U.R.
  author: Karel Čapek
  source: "Project Gutenberg ebook #59112"
  source_url: https://www.gutenberg.org/ebooks/59112
  text: >
    Young Rossum invented a worker with the minimum amount of requirements. He
    had to simplify him. He rejected everything that did not contribute directly
    to the progress of work. Everything that makes man more expensive. In fact he
    rejected man and made the Robot. My dear Miss Glory, the Robots are not
    people. Mechanically they are more perfect than we are; they have an
    enormously developed intelligence, but they have no soul. Helena asked how he
    knew they had no soul, and Domin asked whether she had ever seen what a Robot
    looked like inside.

- id: wells-time-machine-medium-1
  title: "The Time Machine"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #35"
  source_url: https://www.gutenberg.org/ebooks/35
  text: >
    The Time Traveller (for so it will be convenient to speak of him) was
    expounding a recondite matter to us. His pale grey eyes shone and twinkled,
    and his usually pale face was flushed and animated. The fire burnt brightly,
    and the soft radiance of the incandescent lights in the lilies of silver
    caught the bubbles that flashed and passed in our glasses. Our chairs, being
    his patents, embraced and caressed us rather than submitted to be sat upon,
    and there was that luxurious after-dinner atmosphere, when thought runs
    gracefully free of the trammels of precision. And he put it to us in this
    way—marking the points with a lean forefinger—as we sat and lazily admired his
    earnestness over this new paradox (as we thought it) and his fecundity.
- id: wells-war-worlds-medium-1
  title: "The War of the Worlds"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #36"
  source_url: https://www.gutenberg.org/ebooks/36
  text: >
    The planet Mars, I scarcely need remind the reader, revolves about the sun at
    a mean distance of 140,000,000 miles, and the light and heat it receives from
    the sun is barely half of that received by this world. It must be, if the
    nebular hypothesis has any truth, older than our world; and long before this
    earth ceased to be molten, life upon its surface must have begun its course.
    The fact that it is scarcely one seventh of the volume of the earth must have
    accelerated its cooling to the temperature at which life could begin. It has
    air and water and all that is necessary for the support of animated existence.
- id: wells-first-men-moon-medium-1
  title: "The First Men in the Moon"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #1013"
  source_url: https://www.gutenberg.org/ebooks/1013
  text: >
    He was a short, round-bodied, thin-legged little man, with a jerky quality in
    his motions; he had seen fit to clothe his extraordinary mind in a cricket
    cap, an overcoat, and cycling knickerbockers and stockings. Why he did so I do
    not know, for he never cycled and he never played cricket. It was a fortuitous
    concurrence of garments, arising I know not how. He gesticulated with his
    hands and arms, and jerked his head about and buzzed. He buzzed like something
    electric. You never heard such buzzing. And ever and again he cleared his
    throat with a most extraordinary noise.
- id: shelley-frankenstein-medium-1
  title: "Frankenstein; Or, The Modern Prometheus"
  author: "Mary Wollstonecraft Shelley"
  source: "Project Gutenberg ebook #41445"
  source_url: https://www.gutenberg.org/ebooks/41445
  text: >
    It was on a dreary night of November, that I beheld the accomplishment of my
    toils. With an anxiety that almost amounted to agony, I collected the
    instruments of life around me, that I might infuse a spark of being into the
    lifeless thing that lay at my feet. It was already one in the morning; the
    rain pattered dismally against the panes, and my candle was nearly burnt out,
    when, by the glimmer of the half-extinguished light, I saw the dull yellow eye
    of the creature open; it breathed hard, and a convulsive motion agitated its
    limbs.
- id: wells-moreau-medium-1
  title: "The Island of Doctor Moreau"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #159"
  source_url: https://www.gutenberg.org/ebooks/159
  text: >
    I do not propose to add anything to what has already been written concerning
    the loss of the _Lady Vain_. As everyone knows, she collided with a derelict
    when ten days out from Callao. The longboat, with seven of the crew, was
    picked up eighteen days after by H. M. gunboat _Myrtle_, and the story of
    their terrible privations has become quite as well known as the far more
    horrible _Medusa_ case. But I have to add to the published story of the _Lady
    Vain_ another, possibly as horrible and far stranger. It has hitherto been
    supposed that the four men who were in the dingey perished, but this is
    incorrect. I have the best of evidence for this assertion: I was one of the
    four men.
- id: wells-food-gods-medium-1
  title: "The Food of the Gods and How It Came to Earth"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #11696"
  source_url: https://www.gutenberg.org/ebooks/11696
  text: >
    In the middle years of the nineteenth century there first became abundant in
    this strange world of ours a class of men, men tending for the most part to
    become elderly, who are called, and who are very properly called, but who
    dislike extremely to be called--"Scientists." They dislike that word so much
    that from the columns of _Nature_, which was from the first their distinctive
    and characteristic paper, it is as carefully excluded as if it were--that
    other word which is the basis of all really bad language in this country. But
    the Great Public and its Press know better, and "Scientists" they are, and
    when they emerge to any sort of publicity, "distinguished scientists" and
    "eminent scientists" and "well-known scientists" is the very least we call
    them.
- id: serviss-edison-mars-medium-1
  title: "Edison's Conquest of Mars"
  author: "Garrett P. Serviss"
  source: "Project Gutenberg ebook #19141"
  source_url: https://www.gutenberg.org/ebooks/19141
  text: >
    It is impossible that the stupendous events which followed the disastrous
    invasion of the earth by the Martians should go without record, and
    circumstances having placed the facts at my disposal, I deem it a duty, both
    to posterity and to those who were witnesses of and participants in the
    avenging counterstroke that the earth dealt back at its ruthless enemy in the
    heavens, to write down the story in a connected form. The Martians had nearly
    all perished, not through our puny efforts, but in consequence of disease, and
    the few survivors fled in one of their projectile cars, inflicting their
    cruelest blow in the act of departure.
