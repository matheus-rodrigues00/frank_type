  text: >
    Mr. Hungerton, her father, really was the most tactless person upon earth,--a
    fluffy, feathery, untidy cockatoo of a man, perfectly good-natured, but
    absolutely centered upon his own silly self. If anything could have driven me
    from Gladys, it would have been the thought of such a father-in-law. I am
    convinced that he really believed in his heart that I came round to the
    Chestnuts three days a week for the pleasure of his company, and very
    especially to hear his views upon bimetallism, a subject upon which he was by
    way of being an authority.
- id: wells-time-machine-slow-1
  title: "The Time Machine"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #35"
  source_url: https://www.gutenberg.org/ebooks/35
  text: >
    The Time Traveller (for so it will be convenient to speak of him) was
    expounding a recondite matter to us. His pale grey eyes shone and twinkled,
    and his usually pale face was flushed and animated. The fire burnt brightly,
    and the soft radiance of the incandescent lights in the lilies of silver
    caught the bubbles that flashed and passed in our glasses. Our chairs, being
    his patents, embraced and caressed us rather than submitted to be sat upon,
    and there was that luxurious after-dinner atmosphere, when thought runs
    gracefully free of the trammels of precision. And he put it to us in this
    way—marking the points with a lean forefinger—as we sat and lazily admired his
    earnestness over this new paradox (as we thought it) and his fecundity.
- id: wells-war-worlds-slow-1
  title: "The War of the Worlds"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #36"
  source_url: https://www.gutenberg.org/ebooks/36
  text: >
    No one would have believed in the last years of the nineteenth century that
    this world was being watched keenly and closely by intelligences greater than
    man’s and yet as mortal as his own; that as men busied themselves about their
    various concerns they were scrutinised and studied, perhaps almost as narrowly
    as a man with a microscope might scrutinise the transient creatures that swarm
    and multiply in a drop of water. With infinite complacency men went to and fro
    over this globe about their little affairs, serene in their assurance of their
    empire over matter. It is possible that the infusoria under the microscope do
    the same. No one gave a thought to the older worlds of space as sources of
    human danger, or thought of them only to dismiss the idea of life upon them as
    impossible or improbable. It is curious to recall some of the mental habits of
    those departed days..
- id: wells-first-men-moon-slow-1
  title: "The First Men in the Moon"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #1013"
  source_url: https://www.gutenberg.org/ebooks/1013
  text: >
    As I sit down to write here amidst the shadows of vine-leaves under the blue
    sky of southern Italy, it comes to me with a certain quality of astonishment
    that my participation in these amazing adventures of Mr. Cavor was, after all,
    the outcome of the purest accident. It might have been any one. I fell into
    these things at a time when I thought myself removed from the slightest
    possibility of disturbing experiences. I had gone to Lympne because I had
    imagined it the most uneventful place in the world. “Here, at any rate,” said
    I, “I shall find peace and a chance to work!”
