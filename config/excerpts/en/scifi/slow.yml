  text: >
    Naron of the long-lived Rigellian race was the fourth of his line to keep the
    Galactic records. He had the large book which contained the list of the
    numerous races throughout the Galaxies that had developed intelligence, and
    the much smaller book listing those races that had reached maturity and had
    qualified for the Galactic Federation. In the first book, a number of those
    listed were crossed out; those that, for one reason or another, had failed.
    Misfortune and social maladjustment took their toll. In the smaller book,
    however, no member listed had yet blanked out.
