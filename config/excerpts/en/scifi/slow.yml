  text: >
    The Industrialist tried. He grimaced with the effort of it, thinking over and
    over again that the youngsters were ignorant of his identity. And the thought
    was suddenly in his mind. They were quite aware of it, and because they knew
    the boys meant well by them according to their own view of the matter, they
    did not attempt to attack them. The Industrialist wondered aloud about attack,
    and the answering thought came quietly. They were armed. One of the little
    creatures in the cage lifted a metal object, and there was a sudden hole in
    the top of the cage.
- id: forster-machine-stops-slow-1
  title: The Machine Stops
  author: E. M. Forster
  source: "Project Gutenberg ebook #72890"
  source_url: https://www.gutenberg.org/ebooks/72890
  text: >
    Imagine, if you can, a small room, hexagonal in shape, like the cell of a
    bee. It is lighted neither by window nor by lamp, yet it is filled with a
    soft radiance. There are no apertures for ventilation, yet the air is fresh.
    There are no musical instruments, and yet, at the moment that my meditation
    opens, this room is throbbing with melodious sounds. An arm chair is in the
    centre, by its side a reading desk. That is all the furniture. And in the arm
    chair there sits a woman with a face as white as a fungus.

- id: burroughs-princess-mars-slow-1
  title: "A Princess of Mars"
  author: "Edgar Rice Burroughs"
  source: "Project Gutenberg ebook #62"
  source_url: https://www.gutenberg.org/ebooks/62
  text: >
    I am a very old man; how old I do not know. Possibly I am a hundred, possibly
    more; but I cannot tell because I have never aged as other men, nor do I
    remember any childhood. So far as I can recollect I have always been a man, a
    man of about thirty. I appear today as I did forty years and more ago, and yet
    I feel that I cannot go on living forever; that some day I shall die the real
    death from which there is no resurrection. I do not know why I should fear
    death, I who have died twice and am still alive; but yet I have the same
    horror of it as you who have never died, and it is because of this terror of
    death, I believe, that I am so convinced of my mortality.
- id: burroughs-earth-core-slow-1
  title: "At the Earth's Core"
  author: "Edgar Rice Burroughs"
  source: "Project Gutenberg ebook #123"
  source_url: https://www.gutenberg.org/ebooks/123
  text: >
    I was born in Connecticut about thirty years ago. My name is David Innes. My
    father was a wealthy mine owner. When I was nineteen he died. All his property
    was to be mine when I had attained my majority—provided that I had devoted the
    two years intervening in close application to the great business I was to
    inherit. I did my best to fulfil the last wishes of my parent—not because of
    the inheritance, but because I loved and honored my father. For six months I
    toiled in the mines and in the counting-rooms, for I wished to know every
    minute detail of the business.
- id: wells-invisible-man-slow-1
  title: "The Invisible Man"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #5230"
  source_url: https://www.gutenberg.org/ebooks/5230
  text: >
    The stranger came early in February, one wintry day, through a biting wind and
    a driving snow, the last snowfall of the year, over the down, walking from
    Bramblehurst railway station, and carrying a little black portmanteau in his
    thickly gloved hand. He was wrapped up from head to foot, and the brim of his
    soft felt hat hid every inch of his face but the shiny tip of his nose; the
    snow had piled itself against his shoulders and chest, and added a white crest
    to the burden he carried. He staggered into the “Coach and Horses” more dead
    than alive, and flung his portmanteau down. “A fire,” he cried, “in the name
    of human charity! A room and a fire!” He stamped and shook the snow from off
    himself in the bar, and followed Mrs. Hall into her guest parlour to strike
    his bargain. And with that much introduction, that and a couple.
