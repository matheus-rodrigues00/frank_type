  source_url: https://www.gutenberg.org/ebooks/5230
  text: >
    The stranger came early in February, one wintry day, through a biting wind and
    a driving snow, the last snowfall of the year, over the down, walking from
    Bramblehurst railway station, and carrying a little black portmanteau in his
    thickly gloved hand. He was wrapped up from head to foot, and the brim of his
    soft felt hat hid every inch of his face but the shiny tip of his nose; the
    snow had piled itself against his shoulders and chest, and added a white crest
    to the burden he carried. He staggered into the “Coach and Horses” more dead
    than alive, and flung his portmanteau down. “A fire,” he cried, “in the name
    of human charity! A room and a fire!” He stamped and shook the snow from off
    himself in the bar, and followed Mrs. Hall into her guest parlour to strike
    his bargain. And with that much introduction, that and a couple.
- id: doyle-lost-world-fast-1
  title: "The Lost World"
  author: "Arthur Conan Doyle"
  source: "Project Gutenberg ebook #139"
  source_url: https://www.gutenberg.org/ebooks/139
  text: >
    "But chances are all around you. It is the mark of the kind of man I mean that
    he makes his own chances. You can't hold him back. I've never met him, and yet
    I seem to know him so well. There are heroisms all round us waiting to be
    done. It's for men to do them, and for women to reserve their love as a reward
    for such men. Look at that young Frenchman who went up last week in a balloon.
    It was blowing a gale of wind; but because he was announced to go he insisted
    on starting. The wind blew him fifteen hundred miles in twenty-four hours, and
    he fell in the middle of Russia. That was the kind of man I mean. Think of the
    woman he loved, and how other women must have envied her! That's what I should
    like to be,--envied for my man."
