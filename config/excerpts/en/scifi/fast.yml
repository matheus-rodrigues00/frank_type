  text: >
    And now the cry "On to Mars!" was heard on all sides. But for such an
    enterprise funds were needed--millions upon millions. Yet some of the fairest
    and richest portions of the earth had been impoverished by the frightful
    ravages of those enemies who had dropped down upon them from the skies. Still,
    the money must be had. The salvation of the planet, as everybody was now
    convinced, depended upon the successful negotiation of a gigantic war fund, in
    comparison with which all the expenditures in all of the wars that had been
    waged by the nations for 2,000 years would be insignificant. The electrical
    ships and the vibration engines must be constructed by scores and thousands.
    Only Mr. Edison's immense resources and unrivaled equipment had enabled him to
    make the models whose powers had been so satisfactorily shown. But to multiply
    these upon a war scale was not only beyond the resources of any.
