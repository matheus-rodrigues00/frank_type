  title: "A Columbus of Space"
  author: "Garrett P. Serviss"
  source: "Project Gutenberg ebook #8673"
  source_url: https://www.gutenberg.org/ebooks/8673
  text: >
    Really it humbles one's pride of race to see how ignorant the world is of its
    true heroes. Many a man who cuts a great figure in history is, after all, a
    poor specimen of humanity, slavishly following old ruts, destitute of any real
    originality, and remarkable only for some exaggeration of the commonplace. But
    in the case of Edmund Stonewall the world cannot be blamed for its ignorance,
    because, as I have already said, his story remains to be written, and hitherto
    it has been guarded as a profound secret.
- id: burroughs-princess-mars-fast-1
  title: "A Princess of Mars"
  author: "Edgar Rice Burroughs"
  source: "Project Gutenberg ebook #62"
  source_url: https://www.gutenberg.org/ebooks/62
  text: >
    I opened my eyes upon a strange and weird landscape. I knew that I was on
    Mars; not once did I question either my sanity or my wakefulness. I was not
    asleep, no need for pinching here; my inner consciousness told me as plainly
    that I was upon Mars as your conscious mind tells you that you are upon Earth.
    You do not question the fact; neither did I. I found myself lying prone upon a
    bed of yellowish, mosslike vegetation which stretched around me in all
    directions for interminable miles. I seemed to be lying in a deep, circular
    basin, along the outer verge of which I could distinguish the irregularities
    of low hills.
- id: wells-invisible-man-fast-1
  title: "The Invisible Man"
  author: "H. G. Wells"
