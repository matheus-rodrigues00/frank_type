  text: >
    Domin said quietly that he did not regret it even today. Alquist asked, not
    even today? Domin answered dreamily, not even today, the last day of
    civilization. It was a colossal achievement. Alquist, this is our last hour.
    We are already speaking half in the other world. That was not an evil dream
    to shatter the servitude of labor. The dreadful and humiliating labor that
    man had to undergo. Work was too hard. Life was too hard. Alquist said that
    was not what the two Rossums dreamed of.
- id: metropolis-fast-1
  title: Metropolis
  author: Thea von Harbou
  source: "Project Gutenberg ebook #73727"
  source_url: https://www.gutenberg.org/ebooks/73727
  text: >
    Freder pushed open the glass doors. He felt them tremble like strings under
    strokes of the bow. He stepped out on to the narrow gallery which ran around
    this, almost the highest house of Metropolis. The roaring sound received him,
    enveloped him, never coming to an end. Great as Metropolis was, at all four
    corners of the city this roared command was equally perceptible. Freder
    looked across the city at the building known as the New Tower of Babel, where
    the man who was himself the Brain of Metropolis pressed his fingers on the
    blue metal plate.

