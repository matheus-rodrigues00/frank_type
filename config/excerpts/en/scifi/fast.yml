    The thing in the dark repeated in a louder tone, “Say the words.” I had missed
    its last remark. “Not to go on all-fours; that is the Law,” it repeated in a
    kind of sing-song. I realised that I had to repeat this idiotic formula; and
    then began the insanest ceremony. The voice in the dark began intoning a mad
    litany, line by line, and I and the rest to repeat it. As they did so, they
    swayed from side to side in the oddest way, and beat their hands upon their
    knees; and I followed their example. I could have imagined I was already dead
    and in another world. That dark hut, these grotesque dim figures, just flecked
    here and there by a glimmer of light, and all of them swaying in unison and
    chanting,
- id: wells-food-gods-fast-1
  title: "The Food of the Gods and How It Came to Earth"
  author: "H. G. Wells"
  source: "Project Gutenberg ebook #11696"
  source_url: https://www.gutenberg.org/ebooks/11696
  text: >
    They were of course quite undistinguished looking men, as indeed all true
    Scientists are. There is more personal distinction about the mildest-mannered
    actor alive than there is about the entire Royal Society. Mr. Bensington was
    short and very, very bald, and he stooped slightly; he wore gold-rimmed
    spectacles and cloth boots that were abundantly cut open because of his
    numerous corns, and Professor Redwood was entirely ordinary in his appearance.
    Until they happened upon the Food of the Gods (as I must insist upon calling
    it) they led lives of such eminent and studious obscurity that it is hard to
    find anything whatever to tell the reader about them.
- id: serviss-edison-mars-fast-1
