  text: >
    When I expressed an earnest wish for his remarks on Italy, he said, 'I do not
    see that I could make a book upon Italy; yet I should be glad to get two
    hundred pounds, or five hundred pounds, by such a work.' This shewed both that
    a journal of his Tour upon the Continent was not wholly out of his
    contemplation, and that he uniformly adhered to that strange opinion, which
    his indolent disposition made him utter: 'No man but a blockhead ever wrote,
    except for money.' Numerous instances to refute this will occur to all who are
    versed in the history of literature.
- id: gaskell-bronte-fast-1
  title: "The Life of Charlotte Brontë — Volume 1"
  author: "Elizabeth Gaskell"
  source: "Project Gutenberg ebook #1827"
  source_url: https://www.gutenberg.org/ebooks/1827
  text: >
    Haworth is built with an utter disregard of all sanitary conditions: the great
    old churchyard lies above all the houses, and it is terrible to think how the
    very water-springs of the pumps below must be poisoned. But this winter of
    1833-4 was particularly wet and rainy, and there were an unusual number of
    deaths in the village. A dreary season it was to the family in the parsonage:
    their usual walks obstructed by the spongy state of the moors--the passing and
    funeral bells so frequently tolling, and filling the heavy air with their
    mournful sound--and, when they were still, the "chip, chip," of the mason, as
    he cut the grave-stones in a shed close by. In many, living, as it were, in a
    churchyard, and with all the sights and sounds connected with the last offices
    to the dead things of everyday occurrence, the very familiarity would have
    bred indifference. But it was otherwise.
- id: carnegie-autobiography-fast-1
  title: "Autobiography of Andrew Carnegie"
  author: "Andrew Carnegie"
  source: "Project Gutenberg ebook #17976"
  source_url: https://www.gutenberg.org/ebooks/17976
  text: >
    One evening, early in 1850, when I returned home from work, I was told that
    Mr. David Brooks, manager of the telegraph office, had asked my Uncle Hogan if
    he knew where a good boy could be found to act as messenger. Mr. Brooks and my
    uncle were enthusiastic draught-players, and it was over a game of draughts
    that this important inquiry was made. Upon such trifles do the most momentous
    consequences hang. A word, a look, an accent, may affect the destiny not only
    of individuals, but of nations. He is a bold man who calls anything a trifle.
    Who was it who, being advised to disregard trifles, said he always would if
    any one could tell him what a trifle was? The young should remember that upon
    trifles the best gifts of the gods often hang.
