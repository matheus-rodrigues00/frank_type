  text: >
    "I will build a motor car for the great multitude. It will be large enough for
    the family but small enough for the individual to run and care for. It will be
    constructed of the best materials, by the best men to be hired, after the
    simplest designs that modern engineering can devise. But it will be so low in
    price that no man making a good salary will be unable to own one--and enjoy
    with his family the blessing of hours of pleasure in God's great open spaces."
- id: roosevelt-autobiography-fast-1
  title: "Theodore Roosevelt: An Autobiography"
  author: "Theodore Roosevelt"
  source: "Project Gutenberg ebook #3335"
  source_url: https://www.gutenberg.org/ebooks/3335
  text: >
    When a boy I read a passage in one of Marryat's books which always impressed
    me. In this passage the captain of some small British man-of-war is explaining
    to the hero how to acquire the quality of fearlessness. He says that at the
    outset almost every man is frightened when he goes into action, but that the
    course to follow is for the man to keep such a grip on himself that he can act
    just as if he was not frightened. After this is kept up long enough it changes
    from pretense to reality, and the man does in very fact become fearless by
    sheer dint of practicing fearlessness when he does not feel it. (I am using my
    own language, not Marryat's.) This was the theory upon which I went. There
    were all kinds of things of which I was afraid at first, ranging from grizzly
    bears to "mean" horses and gun-fighters; but.
