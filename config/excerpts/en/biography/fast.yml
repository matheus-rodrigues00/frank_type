    My brother Henry was six months old at that time. I used to remember his
    walking into a fire outdoors when he was a week old. It was remarkable in me
    to remember a thing like that, which occurred when I was so young. And it was
    still more remarkable that I should cling to the delusion, for thirty years,
    that I _did_ remember it--for of course it never happened; he would not have
    been able to walk at that age. If I had stopped to reflect, I should not have
    burdened my memory with that impossible rubbish so long. It is believed by
    many people that an impression deposited in a child's memory within the first
    two years of its life cannot remain there five years, but that is an error.
