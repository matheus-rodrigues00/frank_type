- id: douglass-narrative-medium-1
  title: Narrative of the Life of Frederick Douglass
  author: Frederick Douglass
  source: "Project Gutenberg ebook #23"
  source_url: https://www.gutenberg.org/ebooks/23
  text: >
    I lived in Master Hugh's family about seven years. During this time I
    succeeded in learning to read and write. In accomplishing this, I was
    compelled to resort to various stratagems. I had no regular teacher. My
    mistress, who had kindly commenced to instruct me, had, in compliance with
    the advice and direction of her husband, not only ceased to instruct, but had
    set her face against my being instructed by any one else. It is due, however,
    to my mistress to say of her that she did not adopt this course at once.
- id: darwin-autobiography-medium-1
  title: The Autobiography of Charles Darwin
  author: Charles Darwin
  source: "Project Gutenberg ebook #2010"
  source_url: https://www.gutenberg.org/ebooks/2010
  text: >
    I was born at Shrewsbury on February twelfth, eighteen hundred and nine. My
    father, Robert Waring Darwin, was the son of Doctor Erasmus Darwin, whose name
    is well known. My mother was the daughter of Josiah Wedgwood. A man may be
    excused for speaking of himself when he writes an autobiography, and I shall
    therefore give a few recollections of my early life, though they are chiefly
    interesting to myself and to my children.
- id: equiano-narrative-medium-1
  title: The Interesting Narrative of the Life of Olaudah Equiano
  author: Olaudah Equiano
  source: "Project Gutenberg ebook #15399"
  source_url: https://www.gutenberg.org/ebooks/15399
  text: >
    I believe it is difficult for those who publish their own memoirs to escape
    the imputation of vanity, nor is this the only disadvantage under which they
    labor. It is also their misfortune that whatever is uncommon is rarely, if
    ever, believed, and what is obvious we are apt to turn from with disgust and
    to charge the writer with impertinence. People generally think those memoirs
    only worthy to be read or remembered which abound in great or striking events.

- id: jacobs-incidents-medium-1
  title: "Incidents in the Life of a Slave Girl, Written by Herself"
  author: "Harriet A. Jacobs"
  source: "Project Gutenberg ebook #11030"
  source_url: https://www.gutenberg.org/ebooks/11030
  text: >
    I was born a slave; but I never knew it till six years of happy childhood had
    passed away. My father was a carpenter, and considered so intelligent and
    skilful in his trade, that, when buildings out of the common line were to be
    erected, he was sent for from long distances, to be head workman. On condition
    of paying his mistress two hundred dollars a year, and supporting himself, he
    was allowed to work at his trade, and manage his own affairs. His strongest
    wish was to purchase his children; but, though he several times offered his
    hard earnings for that purpose, he never succeeded. In complexion my parents
    were a light shade of brownish yellow, and were termed mulattoes. They lived
    together in a comfortable home; and, though we were all slaves, I was so
    fondly shielded that I never dreamed I was a piece of merchandise, trusted to
    them for safe keeping.
- id: addams-hull-house-medium-1
  title: "Twenty Years at Hull-House; with Autobiographical Notes"
  author: "Jane Addams"
  source: "Project Gutenberg ebook #1325"
  source_url: https://www.gutenberg.org/ebooks/1325
  text: >
    It was in vain we asserted that the collective living was not an essential
    part of the plan, that we would always scrupulously pay our own expenses, and
    that at any moment we might decide to scatter through the neighborhood and to
    live in separate tenements; he still contended that the fascination for most
    of those volunteering residence would lie in the collective living aspect of
    the Settlement. His contention was, of course, essentially sound; there is a
    constant tendency for the residents to "lose themselves in the cave of their
    own companionship," as the Toynbee Hall phrase goes, but on the other hand, it
    is doubtless true that the very companionship, the give and take of
    colleagues, is what tends to keep the Settlement normal and in touch with "the
    world of things as they are." I am happy to say that we never resented this
    nor any other difference of opinion, and that.
- id: antin-promised-land-medium-1
  title: "The Promised Land"
  author: "Mary Antin"
  source: "Project Gutenberg ebook #20885"
  source_url: https://www.gutenberg.org/ebooks/20885
  text: >
    And so suffering, fearing, brooding, rejoicing we crept nearer and nearer to
    the coveted shore, until, on a glorious May morning, six weeks after our
    departure from Polotzk, our eyes beheld the Promised Land, and my father
    received us in his arms. Having made such good time across the ocean, I ought
    to be able to proceed no less rapidly on _terra firma_, where, after all, I am
    more at home. And yet here is where I falter. Not that I hesitated, even for
    the space of a breath, in my first steps in America. There was no time to
    hesitate. The most ignorant immigrant, on landing proceeds to give and receive
    greetings, to eat, sleep and rise, after the manner of his own country;
    wherein he is corrected, admonished, and laughed at, whether by interested
    friends or the most indifferent strangers; and his American experience is thus
    begun. The process is spontaneous on all.
- id: roosevelt-autobiography-medium-1
  title: "Theodore Roosevelt: An Autobiography"
  author: "Theodore Roosevelt"
  source: "Project Gutenberg ebook #3335"
  source_url: https://www.gutenberg.org/ebooks/3335
  text: >
    I was a sickly, delicate boy, suffered much from asthma, and frequently had to
    be taken away on trips to find a place where I could breathe. One of my
    memories is of my father walking up and down the room with me in his arms at
    night when I was a very small person, and of sitting up in bed gasping, with
    my father and mother trying to help me. I went very little to school. I never
    went to the public schools, as my own children later did, both at the "Cove
    School" at Oyster Bay and at the "Ford School" in Washington. For a few months
    I attended Professor McMullen's school in Twentieth Street near the house
    where I was born, but most of the time I had tutors. As I have already said,
    my aunt taught me when I was small. At one time we had a French governess, a
    loved.
- id: adams-education-medium-1
  title: "The Education of Henry Adams"
  author: "Henry Adams"
  source: "Project Gutenberg ebook #2044"
  source_url: https://www.gutenberg.org/ebooks/2044
  text: >
    Not that his ignorance troubled him! He knew enough to be ignorant. His course
    had led him through oceans of ignorance; he had tumbled from one ocean into
    another till he had learned to swim; but even to him education was a serious
    thing. A parent gives life, but as parent, gives no more. A murderer takes
    life, but his deed stops there. A teacher affects eternity; he can never tell
    where his influence stops. A teacher is expected to teach truth, and may
    perhaps flatter himself that he does so, if he stops with the alphabet or the
    multiplication table, as a mother teaches truth by making her child eat with a
    spoon; but morals are quite another truth and philosophy is more complex
    still. A teacher must either treat history as a catalogue, a record, a
    romance, or as an evolution; and whether he affirms or denies evolution, he
    falls into all the.
- id: carnegie-autobiography-medium-1
  title: "Autobiography of Andrew Carnegie"
  author: "Andrew Carnegie"
  source: "Project Gutenberg ebook #17976"
  source_url: https://www.gutenberg.org/ebooks/17976
  text: >
    To begin, then, I was born in Dunfermline, in the attic of the small one-story
    house, corner of Moodie Street and Priory Lane, on the 25th of November, 1835,
    and, as the saying is, "of poor but honest parents, of good kith and kin."
    Dunfermline had long been noted as the center of the damask trade in
    Scotland.[1] My father, William Carnegie, was a damask weaver, the son of
    Andrew Carnegie after whom I was named. hamlet of Patiemuir, two miles south
    of Dunfermline. The growing importance of the linen industry in Dunfermline
    finally led the Carnegies to move to that town.]
- id: twain-chapters-autobiography-medium-1
  title: "Chapters from My Autobiography"
  author: "Mark Twain"
  source: "Project Gutenberg ebook #19987"
  source_url: https://www.gutenberg.org/ebooks/19987
  text: >
    That was a reference to my mother's side of the house. As I have already said,
    she was a Lambton--Lambton with a p, for some of the American Lamptons could
    not spell very well in early times, and so the name suffered at their hands.
    She was a native of Kentucky, and married my father in Lexington in 1823, when
    she was twenty years old and he twenty-four. Neither of them had an overplus
    of property. She brought him two or three negroes, but nothing else, I think.
    They removed to the remote and secluded village of Jamestown, in the mountain
    solitudes of east Tennessee. There their first crop of children was born, but
    as I was of a later vintage I do not remember anything about it. I was
    postponed--postponed to Missouri. Missouri was an unknown new State and needed
    attractions.
