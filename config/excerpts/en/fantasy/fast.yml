  text: >
    So the gardener allowed himself to be persuaded, and went away with the
    messengers, taking his wife and his son with him; and the King, delighted to
    have found a real gardener, entrusted him with the care of his garden. The man
    found no difficulty in making the royal garden produce flowers and fruit, and
    at the end of a year the park was not like the same place, and the King
    showered gifts upon his new servant. The gardener, as you have heard already,
    had a son, who was a very handsome young man, with most agreeable manners, and
    every day he carried the best fruit of the garden to the King, and all the
    prettiest flowers to his daughter. Now this princess was wonderfully pretty
    and was just sixteen years old, and the King was beginning to think it was
    time that she should be married.
