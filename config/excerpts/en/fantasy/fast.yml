    The story had held us, round the fire, sufficiently breathless, but except
    the obvious remark that it was gruesome, as on Christmas Eve in an old house
    a strange tale should essentially be, I remember no comment uttered till
    somebody happened to say that it was the only case he had met in which such a
    visitation had fallen on a child. The case, I may mention, was that of an
    apparition in just such an old house as had gathered us for the occasion.

- id: dunsany-elfland-fast-1
  title: "The King of Elfland's Daughter"
  author: "Lord Dunsany"
  source: "Project Gutenberg ebook #61077"
  source_url: https://www.gutenberg.org/ebooks/61077
  text: >
    When Alveric came to the enchanted wood the light in which Elfland glowed had
    neither grown nor dwindled, and he saw that it came from no radiance that
    shines on the fields we know, unless the wandering lights of wonderful moments
    that sometimes astonish our fields, and are gone the instant they come, are
    strayed over the border of Elfland by some momentary disorder of magic.
    Neither sun nor moon made the light of that enchanted day. A line of pine
    trees up which ivy climbed, as high as their lowering black foliage, stood
    like sentinels at the edge of the wood. The silver spires were shining as
    though it were they that made all this azure glow in which Elfland swam. And
    Alveric having by now come far into Elfland, and being now before its capital
    palace, and knowing that Elfland guarded its mysteries well, drew his father's
    sword before he entered the wood..
- id: dunsany-book-wonder-fast-1
  title: "The Book of Wonder"
  author: "Lord Dunsany"
  source: "Project Gutenberg ebook #7477"
  source_url: https://www.gutenberg.org/ebooks/7477
  text: >
    The Gibbelins eat, as is well known, nothing less good than man. Their evil
    tower is joined to Terra Cognita, to the lands we know, by a bridge. Their
    hoard is beyond reason; avarice has no use for it; they have a separate cellar
    for emeralds and a separate cellar for sapphires; they have filled a hole with
    gold and dig it up when they need it. And the only use that is known for their
    ridiculous wealth is to attract to their larder a continual supply of food. In
    times of famine they have even been known to scatter rubies abroad, a little
    trail of them to some city of Man, and sure enough their larders would soon be
    full again.
