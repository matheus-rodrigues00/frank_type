  text: >
    There was a man named Lessingham dwelt in an old low house in Wastdale, set in
    a gray old garden where yew-trees flourished that had seen Vikings in Copeland
    in their seedling time. Lily and rose and larkspur bloomed in the borders, and
    begonias with blossoms big as saucers, red and white and pink and
    lemon-colour, in the beds before the porch. Climbing roses, honeysuckle,
    clematis, and the scarlet flame-flower scrambled up the walls. Thick woods
    were on every side without the garden, with a gap north-eastward opening on
    the desolate lake and the great fells beyond it: Gable rearing his crag-bound
    head against the sky from behind the straight clean outline of the Screes.
