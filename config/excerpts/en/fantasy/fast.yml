    "No," said the Princess suddenly, "no; I can't give wishes to _you_, it only
    gives me wishes. But I'll let you see the ring make _me_ invisible. Only you
    must shut your eyes while I do it." "Your tea!" Gerald's tone was full of
    contempt. "The lovely Princess," he went on, "reappeared as soon as our hero
    had finished counting fifty. One, two, three, four----" Gerald and Kathleen
    had both closed their eyes. But somehow Jimmy hadn't. He didn't mean to cheat,
    he just forgot. And as Gerald's count reached twenty he saw a panel under the
    window open slowly.
