  text: >
    The Free State of Dorimare was a very small country, but, seeing that it was
    bounded on the south by the sea and on the north and east by mountains, while
    its centre consisted of a rich plain, watered by two rivers, a considerable
    variety of scenery and vegetation was to be found within its borders. Indeed,
    towards the west, in striking contrast with the pastoral sobriety of the
    central plain, the aspect of the country became, if not tropical, at any rate
    distinctly exotic. Nor was this to be wondered at, perhaps; for beyond the
    Debatable Hills (the boundary of Dorimare in the west) lay Fairyland. There
    had, however, been no intercourse between the two countries for many
    centuries.
