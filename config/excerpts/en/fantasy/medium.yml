  text: >
    Marley was dead, to begin with. There is no doubt whatever about that. The
    register of his burial was signed by the clergyman, the clerk, the
    undertaker, and the chief mourner. Scrooge signed it, and Scrooge's name was
    good upon change for anything he chose to put his hand to. Old Marley was as
    dead as a door nail. Mind, I do not mean to say that I know, of my own
    knowledge, what there is particularly dead about a door nail.
- id: macdonald-princess-goblin-medium-1
  title: The Princess and the Goblin
  author: George MacDonald
  source: "Project Gutenberg ebook #708"
  source_url: https://www.gutenberg.org/ebooks/708
  text: >
    There was once a little princess whose father was king over a great country
    full of mountains and valleys. His palace was built upon one of the mountains,
    and was very grand and beautiful. The princess, whose name was Irene, was
    born there, but she was sent, when very young, to be brought up by country
    people in a large house, half castle, half farmhouse, on the side of another
    mountain, about halfway between its base and its peak.
- id: wilde-dorian-gray-medium-1
  title: The Picture of Dorian Gray
  author: Oscar Wilde
  source: "Project Gutenberg ebook #174"
  source_url: https://www.gutenberg.org/ebooks/174
  text: >
    The studio was filled with the rich odor of roses, and when the light summer
    wind stirred amidst the trees of the garden, there came through the open door
    the heavy scent of the lilac, or the more delicate perfume of the pink
    flowering thorn. From the corner of the divan of Persian saddle bags on which
    he was lying, smoking, as was his custom, innumerable cigarettes, Lord Henry
    Wotton could just catch the gleam of the honey sweet blossoms.

- id: macdonald-north-wind-medium-1
  title: "At the Back of the North Wind"
  author: "George MacDonald"
  source: "Project Gutenberg ebook #225"
  source_url: https://www.gutenberg.org/ebooks/225
  text: >
    I HAVE been asked to tell you about the back of the north wind. An old Greek
    writer mentions a people who lived there, and were so comfortable that they
    could not bear it any longer, and drowned themselves. My story is not the same
    as his. I do not think Herodotus had got the right account of the place. I am
    going to tell you how it fared with a boy who went there. He lived in a low
    room over a coach-house; and that was not by any means at the back of the
    north wind, as his mother very well knew. For one side of the room was built
    only of boards, and the boards were so old that you might run a penknife
    through into the north wind. And then let them settle between them which was
    the sharper! I know that when you pulled it out again the wind would.
- id: kingsley-water-babies-medium-1
  title: "The Water-Babies"
  author: "Charles Kingsley"
  source: "Project Gutenberg ebook #1018"
  source_url: https://www.gutenberg.org/ebooks/1018
  text: >
    One day a smart little groom rode into the court where Tom lived. Tom was just
    hiding behind a wall, to heave half a brick at his horse’s legs, as is the
    custom of that country when they welcome strangers; but the groom saw him, and
    halloed to him to know where Mr. Grimes, the chimney-sweep, lived. Now, Mr.
    Grimes was Tom’s own master, and Tom was a good man of business, and always
    civil to customers, so he put the half-brick down quietly behind the wall, and
    proceeded to take orders.
- id: macdonald-phantastes-medium-1
  title: "Phantastes: A Faerie Romance for Men and Women"
  author: "George MacDonald"
  source: "Project Gutenberg ebook #325"
  source_url: https://www.gutenberg.org/ebooks/325
  text: >
    I awoke one morning with the usual perplexity of mind which accompanies the
    return of consciousness. As I lay and looked through the eastern window of my
    room, a faint streak of peach-colour, dividing a cloud that just rose above
    the low swell of the horizon, announced the approach of the sun. As my
    thoughts, which a deep and apparently dreamless sleep had dissolved, began
    again to assume crystalline forms, the strange events of the foregoing night
    presented themselves anew to my wondering consciousness. The day before had
    been my one-and-twentieth birthday. Among other ceremonies investing me with
    my legal rights, the keys of an old secretary, in which my father had kept his
    private papers, had been delivered up to me. As soon as I was left alone, I
    ordered lights in the chamber where the secretary stood, the first lights that
    had been there for many a year; for, since my father’s death.
- id: arabian-nights-medium-1
  title: "The Arabian Nights Entertainments"
  author: "Andrew Lang"
  source: "Project Gutenberg ebook #128"
  source_url: https://www.gutenberg.org/ebooks/128
  text: >
    The grand-vizir himself was the father of two daughters, of whom the elder was
    called Scheherazade, and the younger Dinarzade. Dinarzade had no particular
    gifts to distinguish her from other girls, but her sister was clever and
    courageous in the highest degree. Her father had given her the best masters in
    philosophy, medicine, history and the fine arts, and besides all this, her
    beauty excelled that of any girl in the kingdom of Persia. One day, when the
    grand-vizir was talking to his eldest daughter, who was his delight and pride,
    Scheherazade said to him, "Father, I have a favour to ask of you. Will you
    grant it to me?"
- id: dunsany-elfland-medium-1
  title: "The King of Elfland's Daughter"
  author: "Lord Dunsany"
  source: "Project Gutenberg ebook #61077"
  source_url: https://www.gutenberg.org/ebooks/61077
  text: >
    And at this time there met one day in the forge of Narl, all unknown to Orion,
    the men of the parliament of Erl. They met after sunset when all were home
    from their work. And gravely Narl handed to each the mead that was brewed from
    the clover honey; and when all were come they sat silent. And then Narl broke
    the silence, saying that Alveric ruled over Erl no more and his son was Lord
    of Erl, and telling again how once they had hoped for a magic lord to rule
    over the valley and to make it famous, and saying that this should be he. "And
    where now," he said, "is the magic for which we hoped? For he hunts the deer
    as all his forefathers hunted, and nothing of magic has touched him from over
    there; and there is no new thing."
- id: dunsany-book-wonder-medium-1
  title: "The Book of Wonder"
  author: "Lord Dunsany"
  source: "Project Gutenberg ebook #7477"
  source_url: https://www.gutenberg.org/ebooks/7477
  text: >
    The Gibbelins eat, as is well known, nothing less good than man. Their evil
    tower is joined to Terra Cognita, to the lands we know, by a bridge. Their
    hoard is beyond reason; avarice has no use for it; they have a separate cellar
    for emeralds and a separate cellar for sapphires; they have filled a hole with
    gold and dig it up when they need it. And the only use that is known for their
    ridiculous wealth is to attract to their larder a continual supply of food. In
    times of famine they have even been known to scatter rubies abroad, a little
    trail of them to some city of Man, and sure enough their larders would soon be
    full again.
- id: nesbit-five-children-medium-1
  title: "Five Children and It"
  author: "E. Nesbit"
  source: "Project Gutenberg ebook #778"
  source_url: https://www.gutenberg.org/ebooks/778
  text: >
    'Oh no,' said the Psammead, 'that would never have done. Why, of course at
    sunset what was left over turned into stone. You find the stone bones of the
    Megatherium and things all over the place even now, they tell me.' 'Not a
    bit,' it said; 'it was nearly all sand where I lived, and coal grew on trees,
    and the periwinkles were as big as tea-trays - you find them now; they're
    turned into stone. We sand-fairies used to live on the seashore, and the
    children used to come with their little flint-spades and flint-pails and make
    castles for us to live in. That's thousands of years ago, but I hear that
    children still build castles on the sand. It's difficult to break yourself of
    a habit.'
