  author: "E. Nesbit"
  source: "Project Gutenberg ebook #34219"
  source_url: https://www.gutenberg.org/ebooks/34219
  text: >
    THERE were three of them--Jerry, Jimmy, and Kathleen. Of course, Jerry's name
    was Gerald, and not Jeremiah, whatever you may think; and Jimmy's name was
    James; and Kathleen was never called by her name at all, but Cathy, or Catty,
    or Puss Cat, when her brothers were pleased with her, and Scratch Cat when
    they were not pleased. And they were at school in a little town in the West of
    England--the boys at one school, of course, and the girl at another, because
    the sensible habit of having boys and girls at the same school is not yet as
    common as I hope it will be some day. They used to see each other on Saturdays
    and Sundays at the house of a kind maiden lady; but it was one of those houses
    where it is impossible to play. You know the kind of house, don't you? There
    is a sort of a something.
- id: lang-blue-fairy-slow-1
  title: "The Blue Fairy Book"
  author: "Andrew Lang"
  source: "Project Gutenberg ebook #503"
  source_url: https://www.gutenberg.org/ebooks/503
  text: >
    There was once upon a time a poor miller who had a very beautiful daughter.
    Now it happened one day that he had an audience with the King, and in order to
    appear a person of some importance he told him that he had a daughter who
    could spin straw into gold. “Now that’s a talent worth having,” said the King
    to the miller; “if your daughter is as clever as you say, bring her to my
    palace to-morrow, and I’ll put her to the test.” When the girl was brought to
    him he led her into a room full of straw, gave her a spinning-wheel and
    spindle, and said: “Now set to work and spin all night till early dawn, and if
    by that time you haven’t spun the straw into gold you shall die.” Then he
    closed the door behind him and left her alone inside.
