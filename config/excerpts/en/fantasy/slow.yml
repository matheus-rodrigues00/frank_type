  text: >
    The house was three miles from the station, but before the dusty hired fly had
    rattled along for five minutes the children began to put their heads out of
    the carriage window and to say, 'Aren't we nearly there?' And every time they
    passed a house, which was not very often, they all said, 'Oh, is THIS it?' But
    it never was, till they reached the very top of the hill, just past the
    chalk-quarry and before you come to the gravel-pit. And then there was a white
    house with a green garden and an orchard beyond, and mother said, 'Here we
    are!'
- id: nesbit-enchanted-castle-slow-1
