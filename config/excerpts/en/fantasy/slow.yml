    He happened to be building a Palace when the news came, and he left all the
    bricks kicking about the floor for Nurse to clear up--but then the news was
    rather remarkable news. You see, there was a knock at the front door and
    voices talking downstairs, and Lionel thought it was the man come to see about
    the gas, which had not been allowed to be lighted since the day when Lionel
    made a swing by tying his skipping rope to the gas bracket.
- id: macdonald-north-wind-slow-1
  title: "At the Back of the North Wind"
  author: "George MacDonald"
  source: "Project Gutenberg ebook #225"
  source_url: https://www.gutenberg.org/ebooks/225
  text: >
    I HAVE been asked to tell you about the back of the north wind. An old Greek
    writer mentions a people who lived there, and were so comfortable that they
    could not bear it any longer, and drowned themselves. My story is not the same
    as his. I do not think Herodotus had got the right account of the place. I am
    going to tell you how it fared with a boy who went there. He lived in a low
    room over a coach-house; and that was not by any means at the back of the
    north wind, as his mother very well knew. For one side of the room was built
    only of boards, and the boards were so old that you might run a penknife
    through into the north wind. And then let them settle between them which was
    the sharper! I know that when you pulled it out again the wind would.
- id: kingsley-water-babies-slow-1
  title: "The Water-Babies"
  author: "Charles Kingsley"
  source: "Project Gutenberg ebook #1018"
  source_url: https://www.gutenberg.org/ebooks/1018
  text: >
    ONCE upon a time there was a little chimney-sweep, and his name was Tom. That
    is a short name, and you have heard it before, so you will not have much
    trouble in remembering it. He lived in a great town in the North country,
    where there were plenty of chimneys to sweep, and plenty of money for Tom to
    earn and his master to spend. He could not read nor write, and did not care to
    do either; and he never washed himself, for there was no water up the court
    where he lived. He had never been taught to say his prayers. He never had
    heard of God, or of Christ, except in words which you never have heard, and
    which it would have been well if he had never heard. He cried half his time,
    and laughed the other half. He cried when he had to climb the dark flues,
    rubbing his.
- id: arabian-nights-slow-1
  title: "The Arabian Nights Entertainments"
  author: "Andrew Lang"
  source: "Project Gutenberg ebook #128"
  source_url: https://www.gutenberg.org/ebooks/128
  text: >
    In the chronicles of the ancient dynasty of the Sassanidae, who reigned for
    about four hundred years, from Persia to the borders of China, beyond the
    great river Ganges itself, we read the praises of one of the kings of this
    race, who was said to be the best monarch of his time. His subjects loved him,
    and his neighbors feared him, and when he died he left his kingdom in a more
    prosperous and powerful condition than any king had done before him. The two
    sons who survived him loved each other tenderly, and it was a real grief to
    the elder, Schahriar, that the laws of the empire forbade him to share his
    dominions with his brother Schahzeman. Indeed, after ten years, during which
    this state of things had not ceased to trouble him, Schahriar cut off the
    country of Great Tartary from the Persian Empire and made his brother king.
